        // Tarihten burc indeksini bulan algoritma
        function burcIndeksiBul(tarihDegeri) {
            const tarih = new Date(tarihDegeri);
            const ay = tarih.getMonth() + 1; 
            const gun = tarih.getDate();

            if ((ay == 3 && gun >= 21) || (ay == 4 && gun <= 20)) return 0; // Koç
            if ((ay == 4 && gun >= 21) || (ay == 5 && gun <= 20)) return 1; // Boğa
            if ((ay == 5 && gun >= 21) || (ay == 6 && gun <= 21)) return 2; // İkizler
            if ((ay == 6 && gun >= 22) || (ay == 7 && gun <= 22)) return 3; // Yengeç
            if ((ay == 7 && gun >= 23) || (ay == 8 && gun <= 22)) return 4; // Aslan
            if ((ay == 8 && gun >= 23) || (ay == 9 && gun <= 22)) return 5; // Başak
            if ((ay == 9 && gun >= 23) || (ay == 10 && gun <= 22)) return 6; // Terazi
            if ((ay == 10 && gun >= 23) || (ay == 11 && gun <= 21)) return 7; // Akrep
            if ((ay == 11 && gun >= 22) || (ay == 12 && gun <= 21)) return 8; // Yay
            if ((ay == 12 && gun >= 22) || (ay == 1 && gun <= 19)) return 9; // Oğlak
            if ((ay == 1 && gun >= 20) || (ay == 2 && gun <= 18)) return 10; // Kova
            if ((ay == 2 && gun >= 19) || (ay == 3 && gun <= 20)) return 11; // Balık
            return 0;
        }

            const index1 = burcIndeksiBul(document.getElementById('tarih1').value);
            const index2 = burcIndeksiBul(document.getElementById('tarih2').value);

            const burc1 = burclarDizisi[index1];
            const burc2 = burclarDizisi[index2];

            const seninYorumun = uyumVeritabani[burc1][burc2];

            document.getElementById('burclar-ozet').textContent = `${isim1} (${burc1}) ✨ ${isim2} (${burc2})`;
            document.getElementById('uyum-yorumu').textContent = seninYorumun;
            
            document.getElementById('sonuc-ekrani').style.display = "block";
            document.getElementById('sonuc-ekrani').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
